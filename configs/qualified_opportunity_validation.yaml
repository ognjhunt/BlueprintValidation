schema_version: v1
project_name: "Blueprint Validation Post-Qualification Example"

# Preferred intake: qualified opportunity handoff plus scene-memory first,
# with geometry and scene packages reserved for adapters or stricter paths.
qualified_opportunities:
  warehouse_tote_pick_0787:
    opportunity_handoff_path: ./opportunity_handoff.example.json
    # Preferred canonical handoff path:
    # scene_memory_bundle_path: ../pipeline/scene_memory
    # Legacy geometry adapter path can be omitted when the handoff already sits
    # beside pipeline/advanced_geometry/.
    geometry_bundle_path: ../data/interiorgs/0787_841244
    # scene_package_path remains optional and should only be set for stricter
    # simulator-backed evaluation or contact-critical claims.
    claim_benchmark_path: ./benchmarks/facility_c.fixed_claim.json
    # Legacy direct overrides remain supported when you need them:
    # ply_path: ../data/interiorgs/0787_841244/3dgs_compressed.ply
    # task_hints_path: ../data/interiorgs/0787_841244/task_targets.synthetic.json
    description: "Qualified tote-pick opportunity routed from the upstream qualification pipeline."

scene_memory_runtime:
  preferred_backends: [neoverse, gen3c, cosmos_transfer]
  neoverse:
    allow_runtime_execution: true
    repo_path: ../data/vendor/neoverse
    python_executable: ../.venv/bin/python
    checkpoint_path: ../data/checkpoints/neoverse/

render:
  backend: auto
  resolution: [480, 640]
  fps: 10
  num_frames: 49
  camera_paths:
    - type: orbit
      radius_m: 3.0
      num_orbits: 2

eval_policy:
  headline_scope: wm_only
  claim_protocol: fixed_same_facility_uplift
  primary_endpoint: task_success
  freeze_world_snapshot: true
  split_strategy: disjoint_tasks_and_starts
  replication:
    training_seeds: [0, 1, 2, 3, 4]

eval_polaris:
  enabled: false
