schema_version: v1
project_name: Same-Facility Policy Uplift (OpenVLA)

facilities:
  facility_a:
    name: Facility A
    ply_path: ../data/facilities/facility_a/splat.ply
    claim_benchmark_path: ./benchmarks/facility_a.fixed_claim.json
    description: Target deployment facility world model

render:
  resolution: [480, 640]
  fps: 10
  num_frames: 49
  scene_aware: false
  num_clips_per_path: 2
  stage1_coverage_gate_enabled: false
  stage1_quality_planner_enabled: false
  stage1_quality_autoretry_enabled: false
  stage1_active_perception_enabled: false
  camera_paths:
    - type: orbit
      radius_m: 2.8
    - type: sweep
      length_m: 5.0
    - type: orbit
      radius_m: 1.8
    - type: sweep
      length_m: 3.5

robot_composite:
  enabled: false

finetune:
  dreamdojo_repo: ../data/vendor/DreamDojo
  dreamdojo_checkpoint: ../data/checkpoints/DreamDojo/2B_pretrain/
  eval_world_experiment: cosmos_predict2p5_2B_reason_embeddings_action_conditioned_rectified_flow_bridge_13frame_256x320

enrich:
  cosmos_repo: ../data/vendor/cosmos-transfer
  cosmos_checkpoint: ../data/checkpoints/cosmos-transfer-2.5-2b/

eval_policy:
  # Canonical executable headline: fixed-world same-facility claim only.
  # This is for the deployment site's adapted world model, not novel-site or IRL generalization.
  mode: claim
  headline_scope: wm_uplift
  claim_protocol: fixed_same_facility_uplift
  primary_endpoint: task_success
  freeze_world_snapshot: true
  split_strategy: disjoint_tasks_and_starts
  num_rollouts: 160
  min_absolute_difference: 1.0
  min_manip_success_delta_pp: 15.0
  replication:
    training_seeds: [0, 1, 2, 3, 4, 5, 6, 7]
  claim_strictness:
    site_vs_generic_min_lift_pp: 2.0
  reliability:
    enforce_stage_success: true
    fail_on_short_rollout: true
  tasks:
    - Navigate to the prep counter
    - Approach the sink
    - Move to the pantry shelf
  manipulation_tasks:
    - Pick up the bowl from the counter and place it in the sink
    - Pick up the bottle from the shelf and place it in the target zone
    - Pick up the mug from the prep counter and place it on the drying rack

policy_finetune:
  enabled: true

rollout_dataset:
  enabled: true
  selection_mode: success_near_miss
  near_miss_min_task_score: 5.0
  near_miss_max_task_score: 6.99

policy_compare:
  # Secondary attribution/control check in the same facility; not the primary headline.
  enabled: true
  heldout_num_rollouts: 24
  heldout_seed: 123
  eval_world_model: adapted

policy_adapter:
  name: openvla_oft
  openvla:
    openvla_repo: ../data/vendor/openvla-oft
    finetune_script: vla-scripts/finetune.py
    base_model_name: openvla/openvla-7b
    base_checkpoint_path: ../data/checkpoints/openvla-7b

splatsim:
  enabled: false

external_interaction:
  enabled: false

native_teacher:
  enabled: true
  include_generic_control: true
  generate_corrections: true
  planner_horizon_steps: 16

action_boost:
  enabled: false

policy_rl_loop:
  enabled: false

wm_refresh_loop:
  enabled: false
