schema_version: v1
project_name: Policy Uplift First (DreamZero + External Interaction Eval-First)

facilities:
  facility_a:
    name: Facility A
    ply_path: ../data/facilities/facility_a/splat.ply
    claim_benchmark_path: ./benchmarks/facility_a.fixed_claim.json
    description: Primary deployment site

robot_composite:
  enabled: false

finetune:
  dreamdojo_repo: ../data/vendor/DreamDojo
  dreamdojo_checkpoint: ../data/checkpoints/DreamDojo/2B_pretrain/
  eval_world_experiment: cosmos_predict2p5_2B_reason_embeddings_action_conditioned_rectified_flow_bridge_13frame_256x320

enrich:
  cosmos_repo: ../data/vendor/cosmos-transfer
  cosmos_checkpoint: ../data/checkpoints/cosmos-transfer-2.5-2b/

# Use the fixed-world claim protocol for the canonical same-facility headline.
# This mode is for deployment-site world-model uplift only and does not answer IRL transfer.
eval_policy:
  mode: claim
  headline_scope: wm_uplift
  claim_protocol: fixed_same_facility_uplift
  primary_endpoint: task_success
  freeze_world_snapshot: true
  split_strategy: disjoint_tasks_and_starts
  num_rollouts: 160
  min_absolute_difference: 1.0
  replication:
    training_seeds: [0, 1, 2, 3, 4, 5, 6, 7]
  claim_strictness:
    site_vs_generic_min_lift_pp: 2.0
  reliability:
    enforce_stage_success: true
    fail_on_short_rollout: true

# Heldout policy A/B is a secondary attribution/control check, not the primary headline.
policy_compare:
  enabled: true
  heldout_num_rollouts: 24
  heldout_seed: 123
  eval_world_model: adapted
  # Use explicit heldout tasks to power same-facility heldout-task axes in matrix_report.json.
  heldout_tasks:
    - Pick up bottle and place it in the target zone
    - Pick up bowl and place it in the target zone

policy_adapter:
  name: dreamzero
  dreamzero:
    repo_path: /opt/dreamzero
    checkpoint_path: ../data/checkpoints/dreamzero
    inference_module: dreamzero.inference
    inference_class: DreamZeroInference
    policy_action_dim: 7
    frame_history: 4
    strict_action_contract: true
    allow_training: true
    train_script: scripts/train.py

# External interaction ingest is integrated but OFF by default.
external_interaction:
  enabled: false
  manifest_path: ../data/external_interaction/interaction_manifest.json
  source_name: external

native_teacher:
  enabled: true
  include_generic_control: true
  generate_corrections: true
  planner_horizon_steps: 16

# Optional: disable action-boost autoswitch if you want manual stage control.
action_boost:
  enabled: false
