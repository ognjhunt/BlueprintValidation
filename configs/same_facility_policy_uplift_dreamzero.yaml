schema_version: v1
project_name: Same-Facility Policy Uplift (DreamZero)

facilities:
  facility_a:
    name: Facility A
    ply_path: ./data/facilities/facility_a/splat.ply
    description: Target deployment facility world model

eval_policy:
  mode: research
  headline_scope: dual
  num_rollouts: 24
  min_absolute_difference: 1.0
  min_manip_success_delta_pp: 15.0
  tasks:
    - Navigate to the prep counter
    - Approach the sink
  manipulation_tasks:
    - Pick up the bowl from the counter and place it in the sink
    - Pick up the bottle from the shelf and place it in the target zone

policy_finetune:
  enabled: true

rollout_dataset:
  enabled: true
  selection_mode: success_near_miss
  near_miss_min_task_score: 5.0
  near_miss_max_task_score: 6.99

policy_compare:
  enabled: true
  heldout_num_rollouts: 24
  heldout_seed: 123
  eval_world_model: adapted
  heldout_tasks:
    - Pick up the bottle from the shelf and place it in the target zone

policy_adapter:
  name: dreamzero
  dreamzero:
    repo_path: /opt/dreamzero
    base_model_name: dreamzero/base
    checkpoint_path: ./data/checkpoints/dreamzero
    inference_module: dreamzero.inference
    inference_class: DreamZeroInference
    policy_action_dim: 7
    frame_history: 4
    strict_action_contract: true
    allow_training: true
    train_script: scripts/train.py

splatsim:
  enabled: false

external_interaction:
  enabled: false

action_boost:
  enabled: false

policy_rl_loop:
  enabled: false

wm_refresh_loop:
  enabled: false
