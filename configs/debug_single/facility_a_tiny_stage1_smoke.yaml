schema_version: v1
project_name: Facility A Tiny Stage1 Smoke

facilities:
  facility_a:
    name: Facility A
    ply_path: ../../data/facilities/facility_a/splat.ply
    claim_benchmark_path: ../benchmarks/facility_a.fixed_claim.json
    description: Target deployment facility world model

render:
  resolution: [160, 224]
  fps: 6
  num_frames: 9
  scene_aware: false
  num_clips_per_path: 1
  stage1_coverage_gate_enabled: false
  stage1_quality_planner_enabled: false
  stage1_quality_autoretry_enabled: false
  stage1_active_perception_enabled: false
  camera_paths:
    - type: orbit
      radius_m: 2.2

robot_composite:
  enabled: false

gemini_polish:
  enabled: false

robosplat:
  enabled: false

robosplat_scan:
  enabled: false

splatsim:
  enabled: false

external_interaction:
  enabled: false

native_teacher:
  enabled: false

action_boost:
  enabled: false

policy_finetune:
  enabled: false

policy_rl_loop:
  enabled: false

wm_refresh_loop:
  enabled: false

rollout_dataset:
  enabled: false

policy_compare:
  enabled: false

eval_policy:
  mode: research
  headline_scope: wm_only
